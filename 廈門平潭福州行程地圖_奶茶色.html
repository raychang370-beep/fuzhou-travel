<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廈門・平潭・福州 5天4夜行程</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#6B4A36;
    --navy-deep:#4A3225;
    --teal:#E8C39E;
    --stone:#A67C52;
    --sand:#EDE0CF;
    --paper:#FBF6EE;
    --ink:#3A2A1E;
    --ink-soft:#8A6F58;
    --line:#E0D2B8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans TC', sans-serif;
    color:var(--ink);
    background:var(--navy-deep);
  }
  .app{
    display:flex;
    height:100vh;
    overflow:hidden;
  }

  /* ---- Map side ---- */
  .map-pane{
    flex:1.3;
    position:relative;
    background:var(--navy-deep);
  }
  #map{
    width:100%;
    height:100%;
  }
  .map-title{
    position:absolute;
    top:24px;
    left:24px;
    z-index:500;
    background:rgba(74,50,37,0.9);
    backdrop-filter: blur(6px);
    color:var(--paper);
    padding:14px 20px;
    border-radius:14px;
    font-family:'Noto Serif TC', serif;
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
  }
  .map-title .eyebrow{
    font-size:11px;
    letter-spacing:0.18em;
    color:var(--teal);
    font-weight:700;
    font-family:'Noto Sans TC',sans-serif;
  }
  .map-title h1{
    margin:4px 0 0;
    font-size:20px;
    font-weight:700;
    line-height:1.3;
  }

  .leaflet-popup-content-wrapper{
    background:var(--navy-deep);
    color:var(--paper);
    border-radius:10px;
  }
  .leaflet-popup-tip{ background:var(--navy-deep); }
  .leaflet-popup-content{ font-family:'Noto Sans TC',sans-serif; font-size:13px; margin:10px 12px;}
  .leaflet-popup-content b{ color:var(--teal); }

  /* ---- Day pin number bubbles ---- */
  .pin-bubble{
    width:30px;height:30px;border-radius:50%;
    background:var(--stone);
    border:2px solid var(--paper);
    color:#fff;font-weight:700;font-size:13px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 8px rgba(0,0,0,0.4);
    font-family:'Noto Serif TC',serif;
  }

  /* ---- Panel side ---- */
  .panel{
    width:420px;
    min-width:380px;
    background:var(--paper);
    display:flex;
    flex-direction:column;
    box-shadow:-6px 0 30px rgba(0,0,0,0.25);
    z-index:10;
  }
  .tabs{
    display:flex;
    gap:8px;
    padding:20px 20px 16px;
    overflow-x:auto;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .tab{
    border:none;
    background:var(--sand);
    color:var(--ink-soft);
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:14px;
    padding:9px 18px;
    border-radius:999px;
    cursor:pointer;
    white-space:nowrap;
    transition:all .2s ease;
  }
  .tab:hover{ background:#E4D9C4; }
  .tab.active{
    background:var(--navy);
    color:var(--teal);
  }

  .day-header{
    padding:20px 24px 14px;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .day-header .eyebrow{
    font-size:11px;
    letter-spacing:0.16em;
    font-weight:700;
    color:var(--stone);
    text-transform:uppercase;
  }
  .day-header h2{
    margin:6px 0 4px;
    font-family:'Noto Serif TC',serif;
    font-size:23px;
    font-weight:900;
    color:var(--navy);
    line-height:1.35;
  }
  .day-header p{
    margin:0;
    font-size:13px;
    color:var(--ink-soft);
    line-height:1.6;
  }

  .stops{
    flex:1;
    overflow-y:auto;
    padding:18px 22px 32px;
  }
  .stop{
    display:flex;
    gap:14px;
    padding:14px 0;
    border-bottom:1px dashed var(--line);
    cursor:pointer;
    transition:transform .15s ease;
  }
  .stop:last-child{ border-bottom:none; }
  .stop:hover{ transform: translateX(3px); }
  .stop-num{
    flex-shrink:0;
    width:30px;height:30px;border-radius:50%;
    background:var(--navy);
    color:var(--teal);
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:13px;
    display:flex;align-items:center;justify-content:center;
    margin-top:2px;
  }
  .stop-body .time{
    font-size:11px;
    color:var(--stone);
    font-weight:700;
    letter-spacing:0.05em;
  }
  .stop-body h3{
    margin:2px 0 4px;
    font-size:15.5px;
    font-weight:700;
    color:var(--ink);
  }
  .stop-body p{
    margin:0;
    font-size:12.5px;
    color:var(--ink-soft);
    line-height:1.55;
  }
  .map-link{
    display:inline-flex;
    align-items:center;
    gap:4px;
    margin-top:5px;
    font-size:11.5px;
    color:var(--stone);
    font-weight:700;
    text-decoration:none;
    border:1px solid var(--line);
    border-radius:999px;
    padding:2px 10px;
    background:var(--sand);
    transition:background .15s;
  }
  .map-link:hover{ background:var(--line); }

  .panel-footer{
    padding:14px 22px;
    border-top:1px solid var(--line);
    font-size:11px;
    color:var(--ink-soft);
    flex-shrink:0;
    background:var(--sand);
  }

  @media (max-width: 860px){
    .app{ flex-direction:column; }
    .map-pane{ flex:none; height:42vh; }
    .panel{ width:100%; min-width:0; flex:1; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="map-pane">
    <div class="map-title">
      <div class="eyebrow">FUJIAN COASTAL ROUTE</div>
      <h1>廈門 → 福州 → 平潭<br>5天4夜行程地圖</h1>
    </div>
    <div id="map"></div>
  </div>

  <div class="panel">
    <div class="tabs" id="tabs"></div>
    <div class="day-header" id="dayHeader"></div>
    <div class="stops" id="stops"></div>
    <div class="panel-footer">點選左方地圖標記或卡片可互相對應定位</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
const itinerary = [
  {
    day:1,
    title:"廈門入境 → 福州",
    sub:"搭高鐵或包車前往福州,入住西湖大飯店,晚上逛三坊七巷與夜市",
    center:[26.05,118.9],
    zoom:8,
    stops:[
      {time:"早上", name:"廈門高崎國際機場", lat:24.544, lng:118.128, note:"入境後搭高鐵或包車前往福州"},
      {time:"午後", name:"福州西湖大飯店", lat:26.095795, lng:119.291174, note:"入住飯店,下午休息"},
      {time:"6:00 PM", name:"三坊七巷", lat:26.085262, lng:119.296521, note:"明清古街區,適合散步拍照"},
      {time:"8:00 PM", name:"達明路夜市", lat:26.08886, lng:119.29542, note:"魚丸、肉燕、鍋邊、芋泥、海蠣煎,感受夜市氛圍"}
    ]
  },
  {
    day:2,
    title:"福州 → 平潭北線",
    sub:"早班高鐵前往平潭,北港文創村、仙人井、長江澳風車田、北部生態廊道",
    center:[25.7,119.5],
    zoom:9,
    stops:[
      {time:"7:15 AM", name:"福州西湖大飯店", lat:26.095795, lng:119.291174, note:"出發前往福州南站搭高鐵去平潭"},
      {time:"9:30 AM", name:"北港文創村", lat:25.583387, lng:119.829378, note:"原生態石頭厝村落,文創小店,海鮮麵"},
      {time:"11:30 AM", name:"仙人井(東海仙境)", lat:25.545924, lng:119.870928, note:"海蝕地貌奇觀,門票約RMB35"},
      {time:"2:00 PM", name:"長江澳風力田", lat:25.5, lng:119.75, note:"巨大風車群與大海同框,傍晚夕陽超美"},
      {time:"4:00 PM", name:"北部生態廊道", lat:25.52, lng:119.8, note:"騎電動車/自駕打卡網紅S彎,一路海景"},
      {time:"7:30 PM", name:"福州西湖大飯店", lat:26.095795, lng:119.291174, note:"晚上搭高鐵返回福州,入住"}
    ]
  },
  {
    day:3,
    title:"平潭南線 → 福州",
    sub:"澎前台灣小鎮、平潭縣城小吃,下午返回福州",
    center:[25.6,119.6],
    zoom:9,
    stops:[
      {time:"9:30 AM", name:"澎前台灣小鎮", lat:25.473897, lng:119.822932, note:"逛逛特色商店,買伴手禮,輕鬆不趕趟(可選)"},
      {time:"12:00 PM", name:"平潭縣城", lat:25.5, lng:119.79, note:"咸塭、天長地久、平潭魚丸,品嘗地道海島風味"},
      {time:"3:30 PM", name:"福州西湖大飯店", lat:26.095795, lng:119.291174, note:"坐高鐵回福州南站,再地鐵回飯店,入住"}
    ]
  },
  {
    day:4,
    title:"福州 → 廈門",
    sub:"福州收尾行程,下午前往廈門,入住機場附近準備隔日班機",
    center:[25.3,118.7],
    zoom:8,
    stops:[
      {time:"9:30 AM", name:"三坊七巷", lat:26.085262, lng:119.296521, note:"把沒走完的部分逛完"},
      {time:"11:00 AM", name:"林則徐紀念館", lat:26.0625, lng:119.305, note:"免費預約,室內展館不怕曬,了解福州歷史文化"},
      {time:"5:00 PM", name:"Courtyard by Marriott Xiamen Airport", lat:24.558859, lng:118.13032, note:"前往廈門入住,近機場約15分鐘車程"}
    ]
  },
  {
    day:5,
    title:"搭機返台",
    sub:"一早前往機場,辦理出境手續準備返台",
    center:[24.544,118.128],
    zoom:11,
    stops:[
      {time:"6:00 AM", name:"廈門高崎國際機場", lat:24.544, lng:118.128, note:"建議提早2.5小時到機場辦理出境手續"}
    ]
  }
];

let map = L.map('map', { zoomControl: true }).setView(itinerary[0].center, itinerary[0].zoom);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  maxZoom: 19
}).addTo(map);

let markers = [];

function pinIcon(num){
  return L.divIcon({
    className:'',
    html:`<div class="pin-bubble">${num}</div>`,
    iconSize:[30,30],
    iconAnchor:[15,15]
  });
}

function renderDay(dayIndex){
  const day = itinerary[dayIndex];

  // tabs
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', i===dayIndex);
  });

  // header
  document.getElementById('dayHeader').innerHTML = `
    <div class="eyebrow">DAY ${day.day}</div>
    <h2>${day.title}</h2>
    <p>${day.sub}</p>
  `;

  // stops list
  const stopsEl = document.getElementById('stops');
  stopsEl.innerHTML = day.stops.map((s,i)=>`
    <div class="stop" data-idx="${i}">
      <div class="stop-num">${i+1}</div>
      <div class="stop-body">
        <div class="time">${s.time}</div>
        <h3>${s.name}</h3>
        <p>${s.note}</p>
        <a class="map-link" href="https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📍 Google Maps</a>
      </div>
    </div>
  `).join('');

  stopsEl.querySelectorAll('.stop').forEach(el=>{
    el.addEventListener('click', ()=>{
      const idx = parseInt(el.dataset.idx);
      const s = day.stops[idx];
      map.flyTo([s.lat, s.lng], 13, {duration:0.6});
      markers[idx].openPopup();
    });
  });

  // markers
  markers.forEach(m=>map.removeLayer(m));
  markers = day.stops.map((s,i)=>{
    const m = L.marker([s.lat,s.lng], {icon: pinIcon(i+1)}).addTo(map);
    m.bindPopup(`<b>${s.name}</b><br>${s.time} · ${s.note}<br><a href="https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}" target="_blank" rel="noopener" style="color:#E8C39E;font-size:12px;">📍 Google Maps</a>`);
    return m;
  });

  const bounds = L.latLngBounds(day.stops.map(s=>[s.lat,s.lng]));
  map.flyToBounds(bounds, {padding:[60,60], duration:0.7, maxZoom:12});
}

// tabs init
const tabsEl = document.getElementById('tabs');
tabsEl.innerHTML = itinerary.map((d,i)=>`<button class="tab" data-idx="${i}">Day ${d.day}</button>`).join('');
tabsEl.querySelectorAll('.tab').forEach((btn,i)=>{
  btn.addEventListener('click', ()=>renderDay(i));
});

renderDay(0);
</script>
</body>
</html>
